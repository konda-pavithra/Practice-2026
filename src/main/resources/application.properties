spring.application.name=demo

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/userdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
# IMPORTANT: Replace this secret with a strong random value before deploying to production.
jwt.secret=WW91U2hvdWxkQ2hhbmdlVGhpc0tleUluUHJvZHVjdGlvbkVudmlyb25tZW50IQ==
# Token validity: 24 hours in milliseconds
jwt.expiration-ms=86400000

# Logging
logging.level.com.practice.demo=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
