spring.application.name=demo

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/userdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Stock Ticker
stock.refresh.interval-ms=30000
stock.refresh.initial-delay-ms=5000

# Yahoo Finance API
yahoo.finance.quote-url=https://query2.finance.yahoo.com/v7/finance/quote
yahoo.finance.crumb-url=https://query1.finance.yahoo.com/v1/test/getcrumb
yahoo.finance.consent-url=https://fc.yahoo.com
yahoo.finance.connect-timeout-ms=10000
yahoo.finance.read-timeout-ms=30000

# JWT
# IMPORTANT: Replace this secret with a strong random value before deploying to production.
jwt.secret=WW91U2hvdWxkQ2hhbmdlVGhpc0tleUluUHJvZHVjdGlvbkVudmlyb25tZW50IQ==
# Token validity: 24 hours in milliseconds
jwt.expiration-ms=86400000

# ── Kafka ─────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
# Producer
spring.kafka.producer.client-id=stock-price-producer
spring.kafka.producer.acks=1
# Consumer
spring.kafka.consumer.group-id=portfolio-realtime-group
spring.kafka.consumer.auto-offset-reset=latest
# Kafka topics
kafka.topic.stock-prices=stock.prices
kafka.topic.partitions=3
kafka.topic.replication-factor=1

# ── SSE (Server-Sent Events) ───────────────────────────────────────────────────
# Timeout for each SSE connection (ms). Client reconnects automatically on expiry.
portfolio.stream.emitter-timeout-ms=300000

# ── RabbitMQ ────────────────────────────────────────────────────────────────
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
# Serialize messages as JSON (not Java serialization)
spring.rabbitmq.template.default-receive-queue=stock.alerts.queue

# ── Email (SMTP) ─────────────────────────────────────────────────────────────
# Replace with your SMTP provider credentials before running.
# Example below uses Gmail with an App Password (2FA must be enabled).
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Display name that appears in the From field
alert.mail.from-name=Stock Price Alerts

# ── Price-alert scheduler ─────────────────────────────────────────────────────
# How often to evaluate thresholds against the live stock cache (ms)
alert.check-interval-ms=60000
# Wait this long after startup before the first check (lets stock cache warm up)
alert.check-initial-delay-ms=35000
# Minimum hours between repeated alerts of the same type for the same stock
alert.cooldown-hours=4

# ── Jackson ───────────────────────────────────────────────────────────────────
# Serialize LocalDateTime as ISO-8601 strings (not timestamps) in JSON messages
spring.jackson.serialization.write-dates-as-timestamps=false

# ── SpringDoc / Swagger UI ────────────────────────────────────────────────────
# API docs JSON at /v3/api-docs  (default; kept explicit for clarity)
springdoc.api-docs.path=/v3/api-docs
# Swagger UI served at /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
# Sort operations by HTTP method, tags alphabetically
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
# Enable "Try it out" for all operations by default
springdoc.swagger-ui.try-it-out-enabled=true
# Show a filter box at the top of the UI
springdoc.swagger-ui.filter=true
# Show request duration after each "Execute"
springdoc.swagger-ui.display-request-duration=true
# Deep-link: individual operations can be bookmarked by URL
springdoc.swagger-ui.deep-linking=true
springdoc.default-produces-media-type=application/json

# Logging
logging.level.com.practice.demo=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
