spring.application.name=demo

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/userdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Stock Ticker
stock.refresh.interval-ms=30000
stock.refresh.initial-delay-ms=5000

# Yahoo Finance API
yahoo.finance.quote-url=https://query2.finance.yahoo.com/v7/finance/quote
yahoo.finance.crumb-url=https://query1.finance.yahoo.com/v1/test/getcrumb
yahoo.finance.consent-url=https://fc.yahoo.com
yahoo.finance.connect-timeout-ms=10000
yahoo.finance.read-timeout-ms=30000

# JWT
# IMPORTANT: Replace this secret with a strong random value before deploying to production.
jwt.secret=WW91U2hvdWxkQ2hhbmdlVGhpc0tleUluUHJvZHVjdGlvbkVudmlyb25tZW50IQ==
# Token validity: 24 hours in milliseconds
jwt.expiration-ms=86400000

# Logging
logging.level.com.practice.demo=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
